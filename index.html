<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LCHS Inventory System</title>
    <meta http-equiv="refresh" content="0; url=./kiosk/">
    <script>
        (function redirectRootToKiosk() {
            const path = String(window.location.pathname || "").replace(/\/+$/, "");
            const fileName = path.split("/").pop();
            const atRootIndex = fileName === "" || fileName === "index.html";

            if (atRootIndex) {
                window.location.replace("./kiosk/");
            }
        }());
    </script>
</head>
<body>
    <noscript>
        <p>JavaScript is required for automatic redirect. Open <a href="./kiosk/">kiosk view</a>.</p>
    </noscript>
</body>
</html>
