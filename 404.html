<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found - LCHS Inventory System</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Inter:wght@400;500;600&display=swap"
        rel="stylesheet">
    <!-- Phosphor Icons (Modern Icons) -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
        }

        body {
            font-family: 'Inter', 'Outfit', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #0f172a 100%);
            color: #e2e8f0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 600px;
            width: 100%;
            text-align: center;
            animation: fadeIn 0.6s ease-in;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .icon-wrapper {
            font-size: 6rem;
            margin-bottom: 32px;
            animation: float 3s ease-in-out infinite;
            color: #60a5fa;
        }

        @keyframes float {
            0%, 100% {
                transform: translateY(0px);
            }
            50% {
                transform: translateY(-10px);
            }
        }

        h1 {
            font-family: 'Outfit', sans-serif;
            font-size: 3rem;
            font-weight: 700;
            margin-bottom: 12px;
            background: linear-gradient(135deg, #60a5fa 0%, #3b82f6 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .status-code {
            font-size: 1rem;
            color: #94a3b8;
            margin-bottom: 24px;
            font-weight: 500;
        }

        .message {
            font-size: 1.1rem;
            color: #cbd5e1;
            margin-bottom: 32px;
            line-height: 1.6;
        }

        .actions {
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
            justify-content: center;
            margin-bottom: 32px;
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-family: 'Inter', sans-serif;
            font-size: 0.95rem;
            font-weight: 500;
            cursor: pointer;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s ease;
            text-align: center;
        }

        .btn-primary {
            background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 16px rgba(59, 130, 246, 0.3);
        }

        .btn-secondary {
            background: rgba(100, 116, 139, 0.2);
            color: #cbd5e1;
            border: 1px solid rgba(100, 116, 139, 0.4);
        }

        .btn-secondary:hover {
            background: rgba(100, 116, 139, 0.3);
            border-color: rgba(100, 116, 139, 0.6);
        }

        .footer-text {
            color: #64748b;
            font-size: 0.9rem;
        }

        .footer-text a {
            color: #60a5fa;
            text-decoration: none;
            transition: color 0.3s ease;
        }

        .footer-text a:hover {
            color: #93c5fd;
        }

        @media (max-width: 640px) {
            h1 {
                font-size: 2rem;
            }

            .icon-wrapper {
                font-size: 4rem;
            }

            .actions {
                flex-direction: column;
            }

            .btn {
                width: 100%;
            }
        }
    </style>
</head>

<body>

    <div class="container">
        <div class="icon-wrapper">
            <i class="ph ph-warning"></i>
        </div>

        <h1>404</h1>
        <div class="status-code">Page Not Found</div>

        <p class="message">
            The page you're looking for doesn't exist or may have been moved.
            Let's get you back on track!
        </p>

        <div class="actions">
            <a href="./kiosk/" class="btn btn-primary">
                <i class="ph ph-storefront"></i>
                Go to Kiosk
            </a>
            <a href="./manage/" class="btn btn-primary">
                <i class="ph ph-gear"></i>
                Go to Manage
            </a>
            <button class="btn btn-secondary" onclick="window.history.back();">
                <i class="ph ph-arrow-left"></i>
                Go Back
            </button>
        </div>

        <div class="footer-text">
            Having trouble? Contact your system administrator or try the
            <a href="./">home page</a>.
        </div>
    </div>

</body>

</html>
